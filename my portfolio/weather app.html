<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether — Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c1117;
            --bg-card: rgba(18, 26, 36, 0.7);
            --bg-card-solid: #121a24;
            --border: rgba(255, 255, 255, 0.07);
            --border-light: rgba(255, 255, 255, 0.12);
            --fg: #e8edf3;
            --fg-muted: #6b7a8d;
            --accent: #f0a030;
            --accent-soft: rgba(240, 160, 48, 0.15);
            --cool: #38bdf8;
            --cool-soft: rgba(56, 189, 248, 0.12);
            --warm: #fb923c;
            --danger: #f87171;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'Space Mono', monospace;
        }

        /* Dynamic background canvas */
        #weatherCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: opacity 1.5s ease;
        }

        .bg-gradient.clear {
            background: linear-gradient(170deg, #0c1a2e 0%, #0c1117 40%, #1a1208 100%);
        }

        .bg-gradient.cloudy {
            background: linear-gradient(170deg, #111820 0%, #0c1117 40%, #151515 100%);
        }

        .bg-gradient.rain {
            background: linear-gradient(170deg, #0a0f18 0%, #0c1117 40%, #0d1117 100%);
        }

        .bg-gradient.snow {
            background: linear-gradient(170deg, #141c28 0%, #111820 40%, #181e28 100%);
        }

        .bg-gradient.thunder {
            background: linear-gradient(170deg, #08090e 0%, #0c0e14 40%, #0a0c10 100%);
        }

        .bg-gradient.fog {
            background: linear-gradient(170deg, #12161a 0%, #0e1215 40%, #111518 100%);
        }

        .content-wrap {
            position: relative;
            z-index: 1;
        }

        /* Glass card */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: border-color 0.3s, transform 0.3s;
        }

        .glass:hover {
            border-color: var(--border-light);
        }

        .glass-strong {
            background: rgba(18, 26, 36, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
        }

        /* Search */
        .search-wrapper {
            position: relative;
            max-width: 480px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 14px;
            background: rgba(18, 26, 36, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            color: var(--fg);
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .search-input::placeholder {
            color: var(--fg-muted);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-muted);
            font-size: 0.95rem;
            pointer-events: none;
            transition: color 0.3s;
        }

        .search-input:focus~.search-icon {
            color: var(--accent);
        }

        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 100;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(14, 20, 28, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            display: none;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 14px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: rgba(240, 160, 48, 0.08);
        }

        .search-result-item .city-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .search-result-item .city-detail {
            font-size: 0.78rem;
            color: var(--fg-muted);
        }

        /* Current weather */
        .temp-display {
            font-size: clamp(5rem, 14vw, 9rem);
            font-weight: 200;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, var(--fg) 30%, var(--fg-muted) 100%);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .temp-unit {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            vertical-align: super;
            -webkit-text-fill-color: var(--fg-muted);
        }

        .condition-text {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--fg);
            margin-top: 4px;
        }

        .feels-like {
            font-size: 0.9rem;
            color: var(--fg-muted);
            margin-top: 4px;
        }

        .weather-icon-large {
            font-size: 4.5rem;
            filter: drop-shadow(0 4px 20px rgba(240, 160, 48, 0.3));
            animation: iconFloat 4s ease-in-out infinite;
        }

        @keyframes iconFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Metric cards */
        .metric-card {
            padding: 20px;
            border-radius: 14px;
            background: rgba(18, 26, 36, 0.5);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .metric-card:hover {
            border-color: var(--border-light);
            background: rgba(18, 26, 36, 0.7);
            transform: translateY(-2px);
        }

        .metric-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* Hourly scroll */
        .hourly-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-snap-type: x mandatory;
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .hourly-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .hourly-scroll::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 2px;
        }

        .hourly-item {
            flex-shrink: 0;
            width: 72px;
            padding: 14px 8px;
            border-radius: 14px;
            text-align: center;
            background: rgba(18, 26, 36, 0.4);
            border: 1px solid var(--border);
            scroll-snap-align: start;
            transition: all 0.3s;
            cursor: default;
        }

        .hourly-item.now {
            background: var(--accent-soft);
            border-color: rgba(240, 160, 48, 0.3);
        }

        .hourly-item:hover {
            background: rgba(18, 26, 36, 0.7);
            border-color: var(--border-light);
        }

        .hourly-item .h-time {
            font-size: 0.72rem;
            color: var(--fg-muted);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .hourly-item.now .h-time {
            color: var(--accent);
            font-weight: 700;
        }

        .hourly-item .h-icon {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .hourly-item .h-temp {
            font-size: 0.88rem;
            font-weight: 700;
        }

        /* Daily forecast */
        .daily-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 12px;
            transition: background 0.2s;
            gap: 12px;
        }

        .daily-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .daily-day {
            width: 90px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .daily-icon {
            width: 36px;
            text-align: center;
            font-size: 1.1rem;
        }

        .daily-precip {
            width: 50px;
            font-size: 0.78rem;
            color: var(--cool);
            text-align: center;
        }

        .daily-bar-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .daily-low {
            font-size: 0.82rem;
            color: var(--fg-muted);
            width: 32px;
            text-align: right;
        }

        .daily-bar {
            flex: 1;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }

        .daily-bar-fill {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--cool), var(--accent), var(--warm));
            transition: all 0.6s ease;
        }

        .daily-high {
            font-size: 0.82rem;
            font-weight: 600;
            width: 32px;
        }

        /* Section title */
        .section-title {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--fg-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Sun arc */
        .sun-arc-container {
            position: relative;
            height: 100px;
            overflow: hidden;
            margin: 16px 0;
        }

        .sun-arc-path {
            width: 100%;
            height: 160px;
            border: 2px dashed rgba(240, 160, 48, 0.15);
            border-radius: 50%;
            position: absolute;
            bottom: -60px;
        }

        .sun-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 16px rgba(240, 160, 48, 0.5);
            position: absolute;
            transition: all 1s ease;
        }

        .horizon-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-light);
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 24px;
            border-radius: 12px;
            background: var(--bg-card-solid);
            border: 1px solid var(--border-light);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
            white-space: nowrap;
        }

        .toast.out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
        }

        /* Fade in */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr !important;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .temp-display {
                font-size: 5rem !important;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <canvas id="weatherCanvas"></canvas>
    <div class="bg-gradient clear" id="bgGradient"></div>

    <div class="content-wrap">

        <!-- Header -->
        <header
            style="padding:20px 24px; display:flex; align-items:center; justify-content:space-between; max-width:1200px; margin:0 auto;">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-cloud-sun" style="color:var(--accent); font-size:1.3rem;"></i>
                <span style="font-weight:800; font-size:1.15rem; letter-spacing:0.04em;">AETHER</span>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button id="unitToggle" onclick="toggleUnit()"
                    style="padding:8px 16px; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); color:var(--fg-muted); cursor:pointer; font-family:'Space Mono',monospace; font-size:0.8rem; font-weight:700; transition:all 0.3s;"
                    aria-label="Toggle temperature unit">
                    °C / °F
                </button>
                <button onclick="getLocationWeather()"
                    style="padding:8px 14px; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); color:var(--fg-muted); cursor:pointer; font-size:0.85rem; transition:all 0.3s;"
                    aria-label="Use current location" title="Use my location">
                    <i class="fas fa-location-crosshairs"></i>
                </button>
            </div>
        </header>

        <!-- Search -->
        <div style="max-width:1200px; margin:0 auto; padding:0 24px 32px;">
            <div class="search-wrapper" style="margin:0 auto;">
                <input type="text" class="search-input" id="searchInput" placeholder="Search for a city..."
                    autocomplete="off" aria-label="Search city">
                <i class="fas fa-magnifying-glass search-icon"></i>
                <div class="search-results" id="searchResults"></div>
            </div>
        </div>

        <!-- Main content -->
        <main style="max-width:1200px; margin:0 auto; padding:0 24px 60px;" id="mainContent">

            <!-- Loading state -->
            <div id="loadingState">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;" class="main-grid">
                    <div class="glass-strong" style="padding:40px;">
                        <div class="skeleton" style="width:60%; height:24px; margin-bottom:20px;"></div>
                        <div class="skeleton" style="width:80%; height:100px; margin-bottom:16px;"></div>
                        <div class="skeleton" style="width:40%; height:20px; margin-bottom:8px;"></div>
                        <div class="skeleton" style="width:30%; height:16px;"></div>
                    </div>
                    <div class="glass-strong" style="padding:40px;">
                        <div class="skeleton" style="width:50%; height:24px; margin-bottom:20px;"></div>
                        <div class="skeleton" style="width:100%; height:60px; margin-bottom:12px;"></div>
                        <div class="skeleton" style="width:100%; height:60px; margin-bottom:12px;"></div>
                        <div class="skeleton" style="width:100%; height:60px;"></div>
                    </div>
                </div>
            </div>

            <!-- Weather content (hidden initially) -->
            <div id="weatherContent" style="display:none;">

                <!-- Current + Metrics -->
                <div style="display:grid; grid-template-columns:1.2fr 1fr; gap:24px; margin-bottom:24px;"
                    class="main-grid">

                    <!-- Current weather -->
                    <div class="glass-strong" style="padding:40px;" id="currentCard">
                        <div
                            style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:20px;">
                            <div>
                                <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
                                    <i class="fas fa-location-dot" style="color:var(--accent); font-size:0.85rem;"></i>
                                    <span id="cityName" style="font-weight:700; font-size:1.1rem;"></span>
                                    <span id="countryName" style="color:var(--fg-muted); font-size:0.88rem;"></span>
                                </div>
                                <div class="temp-display" id="currentTemp"></div>
                                <div class="condition-text" id="currentCondition"></div>
                                <div class="feels-like" id="feelsLike"></div>
                            </div>
                            <div class="weather-icon-large" id="currentIcon"></div>
                        </div>
                        <div
                            style="display:flex; align-items:center; gap:20px; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); flex-wrap:wrap;">
                            <div style="display:flex; align-items:center; gap:6px; font-size:0.85rem;">
                                <i class="fas fa-arrow-up" style="color:var(--warm); font-size:0.75rem;"></i>
                                <span id="highTemp" class="mono" style="font-weight:700;"></span>
                            </div>
                            <div style="display:flex; align-items:center; gap:6px; font-size:0.85rem;">
                                <i class="fas fa-arrow-down" style="color:var(--cool); font-size:0.75rem;"></i>
                                <span id="lowTemp" class="mono" style="font-weight:700; color:var(--fg-muted);"></span>
                            </div>
                            <div style="width:1px; height:16px; background:var(--border);"></div>
                            <div style="display:flex; align-items:center; gap:6px; font-size:0.85rem;">
                                <i class="fas fa-droplet" style="color:var(--cool); font-size:0.75rem;"></i>
                                <span id="precipChance" class="mono" style="font-weight:600;"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Metrics grid -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;" class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-icon" style="background:var(--cool-soft); color:var(--cool);">
                                <i class="fas fa-wind"></i>
                            </div>
                            <div class="metric-value mono" id="windSpeed"></div>
                            <div class="metric-label">Wind Speed</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon" style="background:rgba(56,189,248,0.08); color:var(--cool);">
                                <i class="fas fa-droplet"></i>
                            </div>
                            <div class="metric-value mono" id="humidity"></div>
                            <div class="metric-label">Humidity</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon" style="background:var(--accent-soft); color:var(--accent);">
                                <i class="fas fa-eye"></i>
                            </div>
                            <div class="metric-value mono" id="visibility"></div>
                            <div class="metric-label">Visibility</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon" style="background:rgba(251,146,60,0.12); color:var(--warm);">
                                <i class="fas fa-gauge-high"></i>
                            </div>
                            <div class="metric-value mono" id="pressure"></div>
                            <div class="metric-label">Pressure</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon" style="background:rgba(240,160,48,0.12); color:var(--accent);">
                                <i class="fas fa-sun"></i>
                            </div>
                            <div class="metric-value mono" id="uvIndex"></div>
                            <div class="metric-label">UV Index</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon" style="background:rgba(248,113,113,0.1); color:var(--danger);">
                                <i class="fas fa-temperature-half"></i>
                            </div>
                            <div class="metric-value mono" id="dewPoint"></div>
                            <div class="metric-label">Dew Point</div>
                        </div>
                    </div>
                </div>

                <!-- Sunrise/Sunset -->
                <div class="glass" style="padding:24px; margin-bottom:24px;">
                    <div class="section-title"><i class="fas fa-sun" style="color:var(--accent);"></i> Sun Rise & Set
                    </div>
                    <div class="sun-arc-container" id="sunArcContainer">
                        <div class="sun-arc-path"></div>
                        <div class="sun-dot" id="sunDot"></div>
                        <div class="horizon-line"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <div style="text-align:center;">
                            <div
                                style="font-size:0.72rem; color:var(--fg-muted); text-transform:uppercase; letter-spacing:0.06em;">
                                Sunrise</div>
                            <div class="mono" style="font-weight:700; font-size:1.05rem; margin-top:2px;" id="sunrise">
                            </div>
                        </div>
                        <div style="text-align:center;">
                            <div
                                style="font-size:0.72rem; color:var(--fg-muted); text-transform:uppercase; letter-spacing:0.06em;">
                                Day Length</div>
                            <div class="mono"
                                style="font-weight:700; font-size:1.05rem; margin-top:2px; color:var(--accent);"
                                id="dayLength"></div>
                        </div>
                        <div style="text-align:center;">
                            <div
                                style="font-size:0.72rem; color:var(--fg-muted); text-transform:uppercase; letter-spacing:0.06em;">
                                Sunset</div>
                            <div class="mono" style="font-weight:700; font-size:1.05rem; margin-top:2px;" id="sunset">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hourly forecast -->
                <div class="glass" style="padding:24px; margin-bottom:24px;">
                    <div class="section-title"><i class="fas fa-clock" style="color:var(--cool);"></i> Hourly Forecast
                    </div>
                    <div class="hourly-scroll" id="hourlyScroll"></div>
                </div>

                <!-- 7-Day forecast -->
                <div class="glass" style="padding:24px;">
                    <div class="section-title"><i class="fas fa-calendar-days" style="color:var(--accent);"></i> 7-Day
                        Forecast</div>
                    <div id="dailyForecast"></div>
                </div>

            </div>

            <!-- Error state -->
            <div id="errorState" style="display:none; text-align:center; padding:80px 20px;">
                <i class="fas fa-cloud-bolt"
                    style="font-size:4rem; color:var(--fg-muted); opacity:0.3; margin-bottom:20px; display:block;"></i>
                <h3 style="font-size:1.3rem; margin-bottom:8px;">Something went wrong</h3>
                <p style="color:var(--fg-muted); font-size:0.95rem;" id="errorMessage">Unable to fetch weather data.
                    Please try again.</p>
            </div>

        </main>

        <!-- Footer -->
        <footer style="text-align:center; padding:20px 24px 40px; color:var(--fg-muted); font-size:0.78rem;">
            Powered by Open-Meteo API &middot; Built with care
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== State ==========
        let useCelsius = true;
        let currentWeatherCode = 0;
        let particles = [];
        let animationFrameId = null;

        // ========== WMO Weather Codes ==========
        const weatherCodes = {
            0: { label: "Clear Sky", icon: "☀️", bg: "clear", particles: "none" },
            1: { label: "Mainly Clear", icon: "🌤️", bg: "clear", particles: "none" },
            2: { label: "Partly Cloudy", icon: "⛅", bg: "cloudy", particles: "none" },
            3: { label: "Overcast", icon: "☁️", bg: "cloudy", particles: "none" },
            45: { label: "Fog", icon: "🌫️", bg: "fog", particles: "fog" },
            48: { label: "Rime Fog", icon: "🌫️", bg: "fog", particles: "fog" },
            51: { label: "Light Drizzle", icon: "🌦️", bg: "rain", particles: "rain" },
            53: { label: "Moderate Drizzle", icon: "🌦️", bg: "rain", particles: "rain" },
            55: { label: "Dense Drizzle", icon: "🌧️", bg: "rain", particles: "rain" },
            56: { label: "Freezing Drizzle", icon: "🌧️", bg: "rain", particles: "rain" },
            57: { label: "Heavy Freezing Drizzle", icon: "🌧️", bg: "rain", particles: "rain" },
            61: { label: "Slight Rain", icon: "🌧️", bg: "rain", particles: "rain" },
            63: { label: "Moderate Rain", icon: "🌧️", bg: "rain", particles: "rain" },
            65: { label: "Heavy Rain", icon: "🌧️", bg: "rain", particles: "heavy-rain" },
            66: { label: "Light Freezing Rain", icon: "🌧️", bg: "rain", particles: "rain" },
            67: { label: "Heavy Freezing Rain", icon: "🌧️", bg: "rain", particles: "heavy-rain" },
            71: { label: "Slight Snow", icon: "🌨️", bg: "snow", particles: "snow" },
            73: { label: "Moderate Snow", icon: "🌨️", bg: "snow", particles: "snow" },
            75: { label: "Heavy Snow", icon: "❄️", bg: "snow", particles: "heavy-snow" },
            77: { label: "Snow Grains", icon: "🌨️", bg: "snow", particles: "snow" },
            80: { label: "Slight Showers", icon: "🌦️", bg: "rain", particles: "rain" },
            81: { label: "Moderate Showers", icon: "🌧️", bg: "rain", particles: "rain" },
            82: { label: "Violent Showers", icon: "🌧️", bg: "rain", particles: "heavy-rain" },
            85: { label: "Slight Snow Showers", icon: "🌨️", bg: "snow", particles: "snow" },
            86: { label: "Heavy Snow Showers", icon: "❄️", bg: "snow", particles: "heavy-snow" },
            95: { label: "Thunderstorm", icon: "⛈️", bg: "thunder", particles: "heavy-rain" },
            96: { label: "Thunderstorm with Hail", icon: "⛈️", bg: "thunder", particles: "heavy-rain" },
            99: { label: "Severe Thunderstorm", icon: "⛈️", bg: "thunder", particles: "heavy-rain" },
        };

        function getWeatherInfo(code) {
            return weatherCodes[code] || weatherCodes[0];
        }

        // ========== Temperature Helpers ==========
        function toF(c) { return Math.round(c * 9 / 5 + 32); }
        function displayTemp(c) { return useCelsius ? Math.round(c) + "°C" : toF(c) + "°F"; }
        function displayTempShort(c) { return useCelsius ? Math.round(c) + "°" : toF(c) + "°"; }

        function toggleUnit() {
            useCelsius = !useCelsius;
            const btn = document.getElementById("unitToggle");
            btn.style.borderColor = "var(--accent)";
            btn.style.color = "var(--accent)";
            setTimeout(() => { btn.style.borderColor = ""; btn.style.color = ""; }, 400);
            // Re-render if we have data
            if (document.getElementById("weatherContent").style.display !== "none") {
                const loc = document.getElementById("cityName").dataset;
                if (loc.lat) fetchWeather(parseFloat(loc.lat), parseFloat(loc.lon), loc.name, loc.country);
            }
        }

        // ========== Search ==========
        const searchInput = document.getElementById("searchInput");
        const searchResults = document.getElementById("searchResults");
        let searchTimeout = null;

        searchInput.addEventListener("input", () => {
            clearTimeout(searchTimeout);
            const q = searchInput.value.trim();
            if (q.length < 2) { searchResults.classList.remove("show"); return; }
            searchTimeout = setTimeout(() => searchCities(q), 300);
        });

        searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Escape") searchResults.classList.remove("show");
        });

        document.addEventListener("click", (e) => {
            if (!e.target.closest(".search-wrapper")) searchResults.classList.remove("show");
        });

        async function searchCities(query) {
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en&format=json`);
                const data = await res.json();
                if (!data.results || data.results.length === 0) {
                    searchResults.innerHTML = `<div style="padding:16px 20px; color:var(--fg-muted); font-size:0.88rem;">No cities found</div>`;
                    searchResults.classList.add("show");
                    return;
                }
                searchResults.innerHTML = data.results.map(r => `
      <div class="search-result-item" onclick="selectCity(${r.latitude}, ${r.longitude}, '${r.name.replace(/'/g, "\\'")}', '${(r.country || "").replace(/'/g, "\\'")}')">
        <i class="fas fa-location-dot" style="color:var(--fg-muted); font-size:0.8rem;"></i>
        <div>
          <div class="city-name">${r.name}</div>
          <div class="city-detail">${[r.admin1, r.country].filter(Boolean).join(", ")}</div>
        </div>
      </div>
    `).join("");
                searchResults.classList.add("show");
            } catch {
                searchResults.innerHTML = `<div style="padding:16px 20px; color:var(--danger); font-size:0.88rem;">Search error. Try again.</div>`;
                searchResults.classList.add("show");
            }
        }

        function selectCity(lat, lon, name, country) {
            searchInput.value = name;
            searchResults.classList.remove("show");
            fetchWeather(lat, lon, name, country);
        }

        // ========== Geolocation ==========
        function getLocationWeather() {
            if (!navigator.geolocation) {
                showToast("Geolocation not supported by your browser", "error");
                return;
            }
            showToast("Detecting your location...", "info");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    // Reverse geocode to get city name
                    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=&count=1&language=en&format=json`)
                        .catch(() => { });
                    fetchWeather(latitude, longitude, "Your Location", "");
                },
                () => showToast("Location access denied. Search manually.", "error")
            );
        }

        // ========== Fetch Weather ==========
        async function fetchWeather(lat, lon, cityName, country) {
            showLoading();

            try {
                const params = [
                    `latitude=${lat}`, `longitude=${lon}`,
                    `current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,is_day,precipitation,visibility,uv_index,dew_point_2m`,
                    `hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m,is_day`,
                    `daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,uv_index_max`,
                    `timezone=auto`, `forecast_days=7`
                ].join("&");

                const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
                if (!res.ok) throw new Error("API error");
                const data = await res.json();

                renderWeather(data, cityName, country);
            } catch (err) {
                showError("Unable to fetch weather data. Please check your connection and try again.");
            }
        }

        // ========== Render ==========
        function renderWeather(data, cityName, country) {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("errorState").style.display = "none";
            const content = document.getElementById("weatherContent");
            content.style.display = "block";
            content.classList.remove("fade-in");
            void content.offsetWidth;
            content.classList.add("fade-in");

            const cur = data.current;
            const daily = data.daily;
            const hourly = data.hourly;
            const info = getWeatherInfo(cur.weather_code);
            currentWeatherCode = cur.weather_code;

            // Store for unit toggle
            const cn = document.getElementById("cityName");
            cn.dataset.lat = data.latitude;
            cn.dataset.lon = data.longitude;
            cn.dataset.name = cityName;
            cn.dataset.country = country;

            // City
            cn.textContent = cityName;
            document.getElementById("countryName").textContent = country ? `, ${country}` : "";

            // Current
            document.getElementById("currentTemp").innerHTML = displayTemp(cur.temperature_2m);
            document.getElementById("currentCondition").textContent = info.label;
            document.getElementById("feelsLike").textContent = `Feels like ${displayTemp(cur.apparent_temperature)}`;
            document.getElementById("currentIcon").textContent = info.icon;
            document.getElementById("highTemp").textContent = displayTempShort(daily.temperature_2m_max[0]);
            document.getElementById("lowTemp").textContent = displayTempShort(daily.temperature_2m_min[0]);
            document.getElementById("precipChance").textContent = `${daily.precipitation_probability_max[0]}%`;

            // Metrics
            document.getElementById("windSpeed").textContent = `${Math.round(cur.wind_speed_10m)} km/h`;
            document.getElementById("humidity").textContent = `${cur.relative_humidity_2m}%`;
            document.getElementById("visibility").textContent = cur.visibility >= 1000 ? `${(cur.visibility / 1000).toFixed(1)} km` : `${Math.round(cur.visibility)} m`;
            document.getElementById("pressure").textContent = `${Math.round(cur.surface_pressure)} hPa`;
            document.getElementById("uvIndex").textContent = cur.uv_index.toFixed(1);
            document.getElementById("dewPoint").textContent = displayTemp(cur.dew_point_2m);

            // Sunrise / Sunset
            const sunrise = new Date(daily.sunrise[0]);
            const sunset = new Date(daily.sunset[0]);
            document.getElementById("sunrise").textContent = formatTime(sunrise);
            document.getElementById("sunset").textContent = formatTime(sunset);
            const dayMs = sunset - sunrise;
            const dayH = Math.floor(dayMs / 3600000);
            const dayM = Math.floor((dayMs % 3600000) / 60000);
            document.getElementById("dayLength").textContent = `${dayH}h ${dayM}m`;

            // Sun arc position
            updateSunArc(sunrise, sunset);

            // Hourly
            renderHourly(hourly);

            // Daily
            renderDaily(daily);

            // Background + particles
            updateBackground(info.bg);
            initParticles(info.particles);
        }

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
        }

        function updateSunArc(sunrise, sunset) {
            const now = new Date();
            let progress = (now - sunrise) / (sunset - sunrise);
            progress = Math.max(0, Math.min(1, progress));

            const container = document.getElementById("sunArcContainer");
            const w = container.offsetWidth;
            const h = container.offsetHeight;
            const arcW = w;
            const arcH = 100;
            const centerX = w / 2 - 7;
            const baseY = h;

            // Parametric arc: x goes from 0 to w, y is parabolic
            const x = progress * arcW;
            const normalizedX = (x / arcW) * 2 - 1; // -1 to 1
            const y = baseY - arcH * (1 - normalizedX * normalizedX);

            const dot = document.getElementById("sunDot");
            dot.style.left = `${x - 7}px`;
            dot.style.top = `${y - 7}px`;
            dot.style.opacity = (progress > 0 && progress < 1) ? "1" : "0.3";
        }

        // ========== Hourly ==========
        function renderHourly(hourly) {
            const container = document.getElementById("hourlyScroll");
            const now = new Date();
            // Find the index closest to now
            const nowISO = now.toISOString().slice(0, 13);
            let startIdx = hourly.time.findIndex(t => t.startsWith(nowISO));
            if (startIdx < 0) startIdx = 0;
            const count = 24;

            let html = "";
            for (let i = startIdx; i < Math.min(startIdx + count, hourly.time.length); i++) {
                const time = new Date(hourly.time[i]);
                const isNow = i === startIdx;
                const info = getWeatherInfo(hourly.weather_code[i]);
                html += `
      <div class="hourly-item ${isNow ? 'now' : ''}">
        <div class="h-time">${isNow ? "Now" : time.toLocaleTimeString([], { hour: "2-digit", hour12: true })}</div>
        <div class="h-icon">${info.icon}</div>
        <div class="h-temp">${displayTempShort(hourly.temperature_2m[i])}</div>
      </div>
    `;
            }
            container.innerHTML = html;
        }

        // ========== Daily ==========
        function renderDaily(daily) {
            const container = document.getElementById("dailyForecast");
            const allTemps = [...daily.temperature_2m_min, ...daily.temperature_2m_max];
            const globalMin = Math.min(...allTemps);
            const globalMax = Math.max(...allTemps);
            const range = Math.max(globalMax - globalMin, 1);

            const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

            let html = "";
            for (let i = 0; i < daily.time.length; i++) {
                const date = new Date(daily.time[i] + "T12:00:00");
                const dayName = i === 0 ? "Today" : days[date.getDay()];
                const info = getWeatherInfo(daily.weather_code[i]);
                const precip = daily.precipitation_probability_max[i];

                const leftPct = ((daily.temperature_2m_min[i] - globalMin) / range) * 100;
                const widthPct = ((daily.temperature_2m_max[i] - daily.temperature_2m_min[i]) / range) * 100;

                html += `
      <div class="daily-row">
        <div class="daily-day">${dayName}</div>
        <div class="daily-icon">${info.icon}</div>
        <div class="daily-precip"><i class="fas fa-droplet" style="font-size:0.65rem;"></i> ${precip}%</div>
        <div class="daily-bar-wrap">
          <span class="daily-low mono">${displayTempShort(daily.temperature_2m_min[i])}</span>
          <div class="daily-bar">
            <div class="daily-bar-fill" style="left:${leftPct}%; width:${Math.max(widthPct, 4)}%;"></div>
          </div>
          <span class="daily-high mono">${displayTempShort(daily.temperature_2m_max[i])}</span>
        </div>
      </div>
    `;
            }
            container.innerHTML = html;
        }

        // ========== Background ==========
        function updateBackground(type) {
            const bg = document.getElementById("bgGradient");
            bg.className = `bg-gradient ${type}`;
        }

        // ========== Particle System ==========
        const canvas = document.getElementById("weatherCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        function initParticles(type) {
            particles = [];
            const w = canvas.width;
            const h = canvas.height;

            switch (type) {
                case "rain":
                    for (let i = 0; i < 120; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            len: Math.random() * 18 + 8,
                            speed: Math.random() * 6 + 8,
                            opacity: Math.random() * 0.3 + 0.1,
                            type: "rain"
                        });
                    }
                    break;
                case "heavy-rain":
                    for (let i = 0; i < 280; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            len: Math.random() * 24 + 10,
                            speed: Math.random() * 8 + 12,
                            opacity: Math.random() * 0.35 + 0.15,
                            type: "rain"
                        });
                    }
                    break;
                case "snow":
                    for (let i = 0; i < 80; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            r: Math.random() * 3 + 1,
                            speed: Math.random() * 1.5 + 0.5,
                            drift: Math.random() * 0.8 - 0.4,
                            opacity: Math.random() * 0.5 + 0.2,
                            type: "snow"
                        });
                    }
                    break;
                case "heavy-snow":
                    for (let i = 0; i < 180; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            r: Math.random() * 4 + 1,
                            speed: Math.random() * 2 + 0.8,
                            drift: Math.random() * 1 - 0.5,
                            opacity: Math.random() * 0.6 + 0.2,
                            type: "snow"
                        });
                    }
                    break;
                case "fog":
                    for (let i = 0; i < 15; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            r: Math.random() * 200 + 100,
                            speed: Math.random() * 0.3 + 0.1,
                            opacity: Math.random() * 0.04 + 0.01,
                            type: "fog"
                        });
                    }
                    break;
                default: // none / clear / cloudy — add subtle floating dust
                    for (let i = 0; i < 30; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            r: Math.random() * 1.5 + 0.5,
                            speed: Math.random() * 0.2 + 0.05,
                            drift: Math.random() * 0.3 - 0.15,
                            opacity: Math.random() * 0.15 + 0.05,
                            type: "dust"
                        });
                    }
            }
        }

        let thunderTimer = 0;
        let thunderFlash = 0;

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width;
            const h = canvas.height;

            // Thunder flash
            if (thunderFlash > 0) {
                ctx.fillStyle = `rgba(255,255,255,${thunderFlash})`;
                ctx.fillRect(0, 0, w, h);
                thunderFlash *= 0.85;
                if (thunderFlash < 0.01) thunderFlash = 0;
            }

            // Random thunder for thunderstorm backgrounds
            const info = getWeatherInfo(currentWeatherCode);
            if (info.bg === "thunder") {
                thunderTimer++;
                if (thunderTimer > 180 && Math.random() < 0.008) {
                    thunderFlash = 0.25 + Math.random() * 0.15;
                    thunderTimer = 0;
                }
            }

            for (const p of particles) {
                if (p.type === "rain") {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + 1, p.y + p.len);
                    ctx.strokeStyle = `rgba(150,200,255,${p.opacity})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    p.y += p.speed;
                    p.x += 0.5;
                    if (p.y > h) { p.y = -p.len; p.x = Math.random() * w; }
                    if (p.x > w) p.x = 0;
                } else if (p.type === "snow") {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(220,230,245,${p.opacity})`;
                    ctx.fill();
                    p.y += p.speed;
                    p.x += p.drift + Math.sin(p.y * 0.01) * 0.3;
                    if (p.y > h + p.r) { p.y = -p.r; p.x = Math.random() * w; }
                    if (p.x > w + 10) p.x = -10;
                    if (p.x < -10) p.x = w + 10;
                } else if (p.type === "fog") {
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, Math.max(1, p.r));
                    gradient.addColorStop(0, `rgba(180,190,200,${p.opacity})`);
                    gradient.addColorStop(1, `rgba(180,190,200,0)`);
                    ctx.fillStyle = gradient;
                    ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
                    p.x += p.speed;
                    if (p.x - p.r > w) { p.x = -p.r; p.y = Math.random() * h; }
                } else if (p.type === "dust") {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.3, p.r), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(240,200,140,${p.opacity})`;
                    ctx.fill();
                    p.y -= p.speed;
                    p.x += p.drift + Math.sin(p.y * 0.005) * 0.2;
                    if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
                }
            }

            animationFrameId = requestAnimationFrame(animateParticles);
        }

        // Start particle loop
        initParticles("none");
        animateParticles();

        // ========== UI Helpers ==========
        function showLoading() {
            document.getElementById("loadingState").style.display = "block";
            document.getElementById("weatherContent").style.display = "none";
            document.getElementById("errorState").style.display = "none";
        }

        function showError(msg) {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("weatherContent").style.display = "none";
            document.getElementById("errorState").style.display = "block";
            document.getElementById("errorMessage").textContent = msg;
        }

        function showToast(msg, type = "info") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = "toast";
            const icons = { info: "fa-circle-info", success: "fa-circle-check", error: "fa-circle-xmark" };
            const colors = { info: "var(--cool)", success: "var(--success)", error: "var(--danger)" };
            toast.innerHTML = `<i class="fas ${icons[type]}" style="color:${colors[type]};"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add("out");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ========== Default City ==========
        fetchWeather(40.7128, -74.006, "New York", "United States");
    </script>
</body>
